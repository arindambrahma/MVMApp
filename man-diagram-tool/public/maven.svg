<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0F172A"/>
  <!-- Edges: top horizontal (grey), left and right descending to margin (orange) -->
  <line x1="7" y1="7.5" x2="25" y2="7.5" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7" y1="7.5" x2="16" y2="23" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="7.5" x2="16" y2="23" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
  <!-- Input Parameter: diamond (left node) -->
  <polygon points="7,2.5 11.5,7.5 7,12.5 2.5,7.5" fill="#1D4ED8" stroke="#60A5FA" stroke-width="0.8"/>
  <!-- Calculation Step: circle (right node) -->
  <circle cx="25" cy="7.5" r="4.5" fill="#1D4ED8" stroke="#60A5FA" stroke-width="0.8"/>
  <!-- Margin Node: rounded rect (bottom, green) -->
  <rect x="11.5" y="20.5" width="9" height="6.5" rx="2" fill="#059669" stroke="#34D399" stroke-width="0.8"/>
</svg>
